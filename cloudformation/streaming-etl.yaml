AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Streaming ETL Framework - One-Click Deployment
  Creates complete infrastructure: VPC, MSK, RDS, DMS, Glue, and utility Lambdas.
  Automatically sets up database tables, Kafka topics, and starts the pipeline.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Quick Start Configuration"
        Parameters:
          - EnvironmentName
      - Label:
          default: "Database Settings"
        Parameters:
          - RDSPassword
          - DBInstanceClass
      - Label:
          default: "Kafka Settings"
        Parameters:
          - MSKPassword
          - MSKInstanceType
      - Label:
          default: "Processing Settings"
        Parameters:
          - GlueWorkerType
          - GlueNumberOfWorkers
          - DMSInstanceClass
          - CreateDMSVPCRole
    ParameterLabels:
      EnvironmentName:
        default: "Environment Name (used as prefix for all resources)"
      RDSPassword:
        default: "RDS Database Password"
      MSKPassword:
        default: "Kafka SASL Password"

Parameters:
  EnvironmentName:
    Type: String
    Default: etl-streaming
    Description: Prefix for all resource names
    AllowedPattern: ^[a-z0-9-]+$
    ConstraintDescription: Must be lowercase alphanumeric with hyphens

  RDSPassword:
    Type: String
    Default: Amazon123
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    Description: Password for RDS PostgreSQL (min 8 characters)

  MSKPassword:
    Type: String
    Default: KafkaAdmin1234
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    Description: Password for Kafka SASL/SCRAM authentication (min 8 characters)

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t3.small
      - db.t3.medium
    Description: RDS instance size

  MSKInstanceType:
    Type: String
    Default: kafka.t3.small
    AllowedValues:
      - kafka.t3.small
      - kafka.m5.large
    Description: MSK broker instance size

  DMSInstanceClass:
    Type: String
    Default: dms.t3.small
    AllowedValues:
      - dms.t3.small
      - dms.t3.medium
    Description: DMS replication instance size

  GlueWorkerType:
    Type: String
    Default: G.1X
    AllowedValues:
      - G.1X
      - G.2X
    Description: Glue worker type

  GlueNumberOfWorkers:
    Type: Number
    Default: 2
    MinValue: 2
    MaxValue: 10
    Description: Number of Glue workers

  CreateDMSVPCRole:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to false if dms-vpc-role already exists in this account

  DMSTableMappings:
    Type: String
    Default: '{"rules":[]}'
    Description: DMS table mappings JSON (generated by config compiler). Pass via --parameter-overrides during deploy.

  NotificationEmails:
    Type: String
    Default: ''
    Description: Comma-separated email addresses for DQ failure notifications (leave empty to skip email subscriptions)


Conditions:
  ShouldCreateDMSVPCRole: !Equals [!Ref CreateDMSVPCRole, 'true']

Resources:
  # ==========================================================================
  # VPC and Networking
  # ==========================================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc'

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogRole.Arn

  VPCFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/vpc/flowlogs/${EnvironmentName}'
      RetentionInDays: 14

  VPCFlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-vpc-flowlog-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogWrite
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flowlogs/${EnvironmentName}*'

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.1.0/24
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: 10.0.2.0/24
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-private-2'

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.0.101.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-1'

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  # ==========================================================================
  # Security Groups
  # ==========================================================================
  MSKSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MSK cluster security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 9096
          ToPort: 9096
          SourceSecurityGroupId: !Ref GlueSecurityGroup
          Description: SASL/SCRAM from Glue
        - IpProtocol: tcp
          FromPort: 9096
          ToPort: 9096
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: SASL/SCRAM from Lambda
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-msk-sg'

  MSKSecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref MSKSecurityGroup
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref MSKSecurityGroup
      Description: Inter-broker communication

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS PostgreSQL security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
          Description: PostgreSQL from Lambda
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref DMSSecurityGroup
          Description: PostgreSQL from DMS
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-rds-sg'

  GlueSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Glue jobs security group
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-glue-sg'

  GlueSecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GlueSecurityGroup
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      SourceSecurityGroupId: !Ref GlueSecurityGroup
      Description: Glue inter-node communication

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda functions security group
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-lambda-sg'

  DMSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DMS replication instance security group
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-dms-sg'

  # Allow DMS to connect to MSK on port 9096 for SASL/SCRAM
  MSKSecurityGroupDMSIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref MSKSecurityGroup
      IpProtocol: tcp
      FromPort: 9096
      ToPort: 9096
      SourceSecurityGroupId: !Ref DMSSecurityGroup
      Description: Allow DMS to connect to MSK for CDC streaming

  # Allow DMS to connect to RDS on port 5432
  RDSSecurityGroupDMSIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref DMSSecurityGroup
      Description: Allow DMS to connect to RDS for CDC source

  # ==========================================================================
  # KMS Key for MSK SCRAM Secret
  # ==========================================================================
  MSKSecretKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for MSK SCRAM secret
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowKeyAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: '*'
          - Sid: AllowKeyUsage
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:Encrypt
              - kms:ReEncrypt*
              - kms:DescribeKey
            Resource: '*'
          - Sid: AllowMSKAccess
            Effect: Allow
            Principal:
              Service: kafka.amazonaws.com
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  # ==========================================================================
  # Secrets Manager
  # ==========================================================================
  RDSSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${EnvironmentName}/rds/credentials'
      KmsKeyId: !Ref MSKSecretKMSKey
      SecretString: !Sub '{"username":"postgres","password":"${RDSPassword}"}'

  MSKSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'AmazonMSK_${EnvironmentName}_scram'
      KmsKeyId: !Ref MSKSecretKMSKey
      SecretString: !Sub '{"username":"kafkaadmin","password":"${MSKPassword}"}'

  # ==========================================================================
  # S3 Buckets
  # ==========================================================================
  S3AccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-access-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  S3AccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3AccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${S3AccessLogsBucket.Arn}/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt S3AccessLogsBucket.Arn
              - !Sub '${S3AccessLogsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  DeltaBucket:
    Type: AWS::S3::Bucket
    DependsOn: S3AccessLogsBucketPolicy
    Properties:
      BucketName: !Sub '${EnvironmentName}-delta-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt MSKSecretKMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref S3AccessLogsBucket
        LogFilePrefix: delta-logs/

  DeltaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DeltaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt DeltaBucket.Arn
              - !Sub '${DeltaBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  AssetsBucket:
    Type: AWS::S3::Bucket
    DependsOn: S3AccessLogsBucketPolicy
    Properties:
      BucketName: !Sub '${EnvironmentName}-assets-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt MSKSecretKMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref S3AccessLogsBucket
        LogFilePrefix: assets-logs/

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt AssetsBucket.Arn
              - !Sub '${AssetsBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  QuarantineBucket:
    Type: AWS::S3::Bucket
    DependsOn: S3AccessLogsBucketPolicy
    Properties:
      BucketName: !Sub '${EnvironmentName}-quarantine-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !GetAtt MSKSecretKMSKey.Arn
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref S3AccessLogsBucket
        LogFilePrefix: quarantine-logs/

  QuarantineBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref QuarantineBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt QuarantineBucket.Arn
              - !Sub '${QuarantineBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ==========================================================================
  # RDS PostgreSQL
  # ==========================================================================
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  DBParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Family: postgres16
      Description: Enable logical replication for CDC
      Parameters:
        rds.logical_replication: '1'
        max_replication_slots: '10'
        max_wal_senders: '10'

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${EnvironmentName}-postgres'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: '16.11'
      DBName: etldb
      MasterUsername: postgres
      MasterUserPassword: !Ref RDSPassword
      AllocatedStorage: 50
      MaxAllocatedStorage: 100
      StorageType: gp3
      DBSubnetGroupName: !Ref DBSubnetGroup
      DBParameterGroupName: !Ref DBParameterGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false
      MultiAZ: true
      BackupRetentionPeriod: 1
      DeletionProtection: false
      StorageEncrypted: true
      KmsKeyId: !GetAtt MSKSecretKMSKey.Arn
      EnableIAMDatabaseAuthentication: true

  # ==========================================================================
  # MSK Cluster
  # ==========================================================================
  MSKConfiguration:
    Type: AWS::MSK::Configuration
    Properties:
      Name: !Sub '${EnvironmentName}-msk-config'
      ServerProperties: |
        auto.create.topics.enable=true
        delete.topic.enable=true
        default.replication.factor=2
        min.insync.replicas=1
        num.partitions=3
        log.retention.hours=24

  MSKCluster:
    Type: AWS::MSK::Cluster
    DependsOn: RDSInstance
    Properties:
      ClusterName: !Sub '${EnvironmentName}-msk'
      KafkaVersion: '3.5.1'
      NumberOfBrokerNodes: 2
      BrokerNodeGroupInfo:
        InstanceType: !Ref MSKInstanceType
        ClientSubnets:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroups:
          - !Ref MSKSecurityGroup
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: 50
      ClientAuthentication:
        Sasl:
          Scram:
            Enabled: true
        Unauthenticated:
          Enabled: false
      ConfigurationInfo:
        Arn: !GetAtt MSKConfiguration.Arn
        Revision: 1
      EncryptionInfo:
        EncryptionInTransit:
          ClientBroker: TLS
          InCluster: true
      LoggingInfo:
        BrokerLogs:
          CloudWatchLogs:
            Enabled: true
            LogGroup: !Ref MSKLogGroup

  MSKLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/msk/${EnvironmentName}'
      RetentionInDays: 14

  MSKScramSecretAssociation:
    Type: AWS::MSK::BatchScramSecret
    DependsOn: MSKCluster
    Properties:
      ClusterArn: !Ref MSKCluster
      SecretArnList:
        - !Ref MSKSecret

  # Custom Resource to get MSK Bootstrap Servers (not available via GetAtt)
  MSKBootstrapLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-msk-bootstrap-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MSKDescribe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kafka:GetBootstrapBrokers
                  - kafka:DescribeCluster
                Resource: !Sub 'arn:aws:kafka:${AWS::Region}:${AWS::AccountId}:cluster/${EnvironmentName}-msk/*'
        - PolicyName: Logs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${EnvironmentName}-msk-bootstrap*'

  MSKBootstrapFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-msk-bootstrap'
      Runtime: python3.10
      Handler: index.handler
      Role: !GetAtt MSKBootstrapLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              try:
                  cluster_arn = event['ResourceProperties']['ClusterArn']
                  client = boto3.client('kafka')
                  response = client.get_bootstrap_brokers(ClusterArn=cluster_arn)
                  bootstrap = response.get('BootstrapBrokerStringSaslScram', '')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, 
                      {'BootstrapServers': bootstrap})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  MSKBootstrapServersResource:
    Type: Custom::MSKBootstrap
    DependsOn: 
      - MSKCluster
      - MSKScramSecretAssociation
    Properties:
      ServiceToken: !GetAtt MSKBootstrapFunction.Arn
      ClusterArn: !Ref MSKCluster

  # ==========================================================================
  # IAM Roles
  # ==========================================================================
  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-glue-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GlueS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !GetAtt DeltaBucket.Arn
                  - !GetAtt AssetsBucket.Arn
                  - !GetAtt QuarantineBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub '${DeltaBucket.Arn}/*'
                  - !Sub '${AssetsBucket.Arn}/*'
                  - !Sub '${QuarantineBucket.Arn}/*'
        - PolicyName: GlueSecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref MSKSecret
                  - !Ref RDSSecret
              - Effect: Allow
                Action:
                  - secretsmanager:ListSecrets
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt MSKSecretKMSKey.Arn
        - PolicyName: GlueLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws-glue/*'
        - PolicyName: GlueCatalogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetTable
                  - glue:GetTables
                  - glue:CreateTable
                  - glue:UpdateTable
                  - glue:GetConnection
                Resource:
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${EnvironmentName}_db'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${EnvironmentName}_db/*'
                  - !Sub 'arn:aws:glue:${AWS::Region}:${AWS::AccountId}:connection/*'
        - PolicyName: GlueEC2Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
